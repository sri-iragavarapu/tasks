<!DOCTYPE html>
<html lang="en">
<head>
    <title>Portal Access</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ebf3f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #ffffff; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,123,255,0.15); width: 300px; text-align: center; border-top: 5px solid #0056b3; }
        h2 { color: #0056b3; margin-top: 0; font-size: 24px; }
        .input-field { width: 90%; padding: 12px; margin: 12px 0; border: 1px solid #b3d1ff; border-radius: 6px; outline: none; }
        .input-field:focus { border-color: #0056b3; }
        .submit-btn { width: 98%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .submit-btn:hover { background: #004085; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Staff Login</h2>
        <form id="accessForm">
            <input type="text" id="username" class="input-field" placeholder="Username (UN)" required>
            <input type="password" id="password" class="input-field" placeholder="Password (PW)" required>
            <button type="submit" class="submit-btn">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('accessForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const staffName = document.getElementById("username").value;
            localStorage.setItem('loggedInUser', staffName);
            window.location.href = 'dashboard1.html';
        });
    </script>
</body>
</html>
